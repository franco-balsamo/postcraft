version: '3.9'

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postcraft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       postcraft
      POSTGRES_USER:     postcraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed to host — only reachable within the Docker network
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U postcraft -d postcraft']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: postcraft_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # No ports exposed to host — only reachable within the Docker network
    healthcheck:
      test:     ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: postcraft_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        3000
      DATABASE_URL: postgresql://postcraft:${POSTGRES_PASSWORD}@postgres:5432/postcraft
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379

      # Required — no fallback. Set in .env or CI/CD secrets manager.
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-7d}

      META_APP_ID:            ${META_APP_ID}
      META_APP_SECRET:        ${META_APP_SECRET}
      META_CALLBACK_URL:      ${META_CALLBACK_URL}

      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}

      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STARTER:   ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_PRO:       ${STRIPE_PRICE_PRO}
      STRIPE_PRICE_AGENCY:    ${STRIPE_PRICE_AGENCY}

      APP_URL:                ${APP_URL:-http://localhost:3000}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost:5173}
      # Comma-separated list of allowed origins — no wildcard default
      CORS_ORIGIN:            ${CORS_ORIGIN}

    ports:
      - '3000:3000'
    healthcheck:
      test:     ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout:  10s
      retries:  3

volumes:
  postgres_data:
  redis_data:
