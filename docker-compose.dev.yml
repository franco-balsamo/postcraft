version: '3.9'

# Development override — run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Or use the shortcut:  docker compose -f docker-compose.dev.yml up --build
# (this file is self-contained for local dev)

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postcraft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       postcraft
      POSTGRES_USER:     postcraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'   # exposed locally for DB inspection tools (dev only)
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U postcraft -d postcraft']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: postcraft_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'   # exposed locally for inspection (dev only)
    healthcheck:
      test:     ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    image: node:20-alpine
    container_name: postcraft_backend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:    development
      PORT:        3000
      DATABASE_URL: postgresql://postcraft:${POSTGRES_PASSWORD}@postgres:5432/postcraft
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379

      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-7d}

      META_APP_ID:            ${META_APP_ID:-}
      META_APP_SECRET:        ${META_APP_SECRET:-}
      META_CALLBACK_URL:      ${META_CALLBACK_URL:-http://localhost:3000/auth/meta/callback}

      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET:-}

      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER:   ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO:       ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_AGENCY:    ${STRIPE_PRICE_AGENCY:-}

      APP_URL:                ${APP_URL:-http://localhost:3000}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGIN:            ${CORS_ORIGIN:-http://localhost:5173}

    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    ports:
      - '3000:3000'
    command: sh -c "npm install && sh start.sh"
    healthcheck:
      test:     ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout:  10s
      start_period: 30s
      retries:  3

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: postcraft_frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - '5173:5173'
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  redis_data:
  backend_modules:
  frontend_modules:
